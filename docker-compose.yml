services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatapp-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=ChatAppDb;Username=postgres;Password=${DB_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=ChatApp
      - Jwt__Audience=ChatAppUsers
    volumes:
      - uploads_data:/app/wwwroot/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatapp-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: chatapp-db
    environment:
      - POSTGRES_DB=ChatAppDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ChatAppDb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chatapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chatapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  postgres_data:   # PostgreSQL database files
  redis_data:      # Redis AOF persistence
  uploads_data:    # User uploaded files (wwwroot/uploads)

networks:
  chatapp-network:
    driver: bridge
